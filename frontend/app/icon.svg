<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Cyber shield contour -->
  <path d="M16 2L28 7v7c0 7.5-5.5 12.5-12 16C9.5 26.5 4 21.5 4 14V7L16 2z" fill="#030712" stroke="url(#cyan-grad)" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Neural diagnostic wave / Heartbeat cross -->
  <path d="M11 16h3.5l1.5-4 1.5 8 1-4H21" stroke="url(#pulse-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Glowing central node -->
  <circle cx="16" cy="16" r="1.5" fill="#22d3ee" filter="url(#glow)"/>

  <defs>
    <!-- Cyan gradient -->
    <linearGradient id="cyan-grad" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Pulse violet-pink gradient -->
    <linearGradient id="pulse-grad" x1="11" y1="12" x2="21" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="12" y="12" width="8" height="8" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
</svg>
